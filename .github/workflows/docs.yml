name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Only the deploy steps need elevated permissions; the build job below runs
# with these scopes so the upload-pages-artifact step in the same job works.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deployments concurrently - the second would race the
# first and fail. PR / dispatch runs build but skip deploy, so they don't
# need to queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Set up uv
        # astral-sh/setup-uv doesn't publish a moving major-version tag — must
        # pin to the exact release. Bump as new minors land.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('VHI_godot.csproj', '.config/dotnet-tools.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore .NET local tools
        run: dotnet tool restore

      - name: Generate C# API reference
        run: ./tools/gen_api_docs.sh

      - name: Build docs site
        run: uv run --locked --group docs properdocs build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    # Only deploy on push to main. PRs and workflow_dispatch builds skip this.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
